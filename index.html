<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abar Vault</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <section class="hero">
        <div>
          <div class="kicker">
            <img src="/assets/abargon-logo-transparent.png" alt="Abargon" />
            <strong>Vault</strong>
          </div>
          <h1 id="library-title">Abar Vault</h1>
          <p id="library-description">Archivo, leads, clientes y tools en un solo espacio ordenado.</p>
          <div class="hero-metrics" aria-label="Enfoque de la biblioteca">
            <div>
              <strong>01</strong>
              <span>Leads</span>
            </div>
            <div>
              <strong>02</strong>
              <span>Tools</span>
            </div>
            <div>
              <strong>03</strong>
              <span>Clientes</span>
            </div>
          </div>
          <a class="portal-cta" href="/vault/">Abrir estructura del Vault</a>
        </div>
      </section>

      <section class="toolbar" aria-label="Controles de biblioteca">
        <label class="search">
          <span aria-hidden="true">Search</span>
          <input id="search-input" placeholder="Buscar por nombre, tema o etiqueta" />
        </label>
        <div class="segments" role="tablist" aria-label="Filtrar por tipo">
          <button class="active" data-filter="all">Todo</button>
          <button data-filter="lead">Leads</button>
          <button data-filter="client">Clientes</button>
          <button data-filter="simulator">Tools</button>
          <button data-filter="document">Archivo</button>
        </div>
      </section>

      <section class="grid" id="library-grid" aria-label="Contenido publicado"></section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
