    <style>
      body {
        max-width: 760px;
        margin: 0 auto;

  <body>
    <h1>Cómo agregar contenido</h1>
    <p>Guarda documentos en <code>library/documents</code> y simuladores en <code>library/simulators</code>.</p>
    <p>Después agrega una entrada en <code>library/manifest.json</code> con título, tipo, descripción, enlace y etiquetas.</p>
  </body>
